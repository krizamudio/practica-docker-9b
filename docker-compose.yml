services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile

    image: taskcontainer-database:latest
    container_name: taskcontainer-database
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: taskcontainer-backend
    restart: unless-stopped

    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_VERSION: ${APP_VERSION}
      NODE_ENV: production

    ports:
      - "${BACKEND_PORT}:3000"

    depends_on:
      database:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api

    container_name: taskcontainer-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT}:80"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
